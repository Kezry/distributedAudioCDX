name: CI

on:
  push:
  pull_request:

jobs:
  repository-checks:
    name: Repository checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Repository validation script
        run: pwsh -NoProfile -File scripts/validate-repository.ps1
      - name: Required files
        run: |
          test -f .gitignore
          test -f LICENSE
          test -f README.md
          test -f docs/PROTOCOL.md

  android:
    name: Android APKs
    runs-on: ubuntu-latest
    needs: repository-checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2
      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - name: Build Android sound end
        working-directory: android-sound-end
        run: gradle --no-daemon assembleDebug
      - name: Build Android config app
        working-directory: android-config-app
        run: gradle --no-daemon assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-apks
          path: |
            android-sound-end/app/build/outputs/apk/debug/*.apk
            android-config-app/app/build/outputs/apk/debug/*.apk

  windows:
    name: Windows app and tests
    runs-on: windows-latest
    needs: repository-checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        working-directory: windows-sender
        run: dotnet restore DistributedAudioCDX.sln
      - name: Build
        working-directory: windows-sender
        run: dotnet build DistributedAudioCDX.sln --configuration Release --no-restore
      - name: Run protocol tests
        working-directory: windows-sender/tests/Dacdx.Windows.Tests
        run: dotnet run --configuration Release --no-build
      - name: Publish app
        working-directory: windows-sender/src/Dacdx.Windows.App
        run: dotnet publish --configuration Release --output ../../../artifacts/app
      - name: Publish service
        working-directory: windows-sender/src/Dacdx.Windows.Service
        run: dotnet publish --configuration Release --output ../../../artifacts/service
      - uses: actions/upload-artifact@v4
        with:
          name: windows-sender
          path: windows-sender/artifacts/

  driver:
    name: Virtual audio driver build
    runs-on: windows-latest
    needs: repository-checks
    steps:
      - uses: actions/checkout@v4
      - name: Install WDK
        shell: pwsh
        run: |
          choco install windowsdriverkit10 -y --no-progress
          Write-Host "WDK package installed for build validation. This job does not produce a production-signed driver."
      - name: Check WDK headers
        shell: pwsh
        run: |
          $headers = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\Include' -Recurse -Filter ntddk.h -ErrorAction SilentlyContinue | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path windows-sender/driver/artifacts | Out-Null
          if ($headers) {
            "WDK_AVAILABLE=true" | Out-File -FilePath $env:GITHUB_ENV -Append
            "Found ntddk.h at $($headers.FullName)" | Out-File windows-sender/driver/artifacts/wdk-status.txt
          } else {
            "WDK_AVAILABLE=false" | Out-File -FilePath $env:GITHUB_ENV -Append
            "WDK headers were not available on this runner after installing windowsdriverkit10. Driver source is present, but build validation was skipped because ntddk.h could not be found." | Out-File windows-sender/driver/artifacts/wdk-status.txt
          }
      - name: Locate MSBuild
        if: env.WDK_AVAILABLE == 'true'
        uses: microsoft/setup-msbuild@v2
      - name: Build driver
        if: env.WDK_AVAILABLE == 'true'
        working-directory: windows-sender/driver
        run: msbuild DacdxVirtualAudio.vcxproj /p:Configuration=Release /p:Platform=x64 /m
      - uses: actions/upload-artifact@v4
        with:
          name: dacdx-virtual-audio-driver-build
          path: |
            windows-sender/driver/artifacts/**
            windows-sender/driver/**/*.sys
            windows-sender/driver/**/*.inf
            windows-sender/driver/**/*.cat
            windows-sender/driver/**/*.pdb
